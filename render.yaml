services:
  - type: web
    name: wenlv-backend
    runtime: python
    repo: https://github.com/wiwei069/WenLv_World
    buildCommand: cd backend && mkdir -p data/fonts && curl -sL -o data/fonts/NotoSansSC-Regular.ttf "https://fonts.gstatic.com/s/notosanssc/v40/k3kCo84MPvpLmixcA63oeAL7Iqp5IZJF9bmaG9_FnYw.ttf" && pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: TAVILY_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PDF_FONT_PATH
        value: data/fonts/NotoSansSC-Regular.ttf
